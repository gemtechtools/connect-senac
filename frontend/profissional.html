<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Docente - Connect Senac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand {
            font-weight: 700;
        }

        .section-title {
            color: #004a8d;
            font-weight: 700;
        }

        .accordion-button:not(.collapsed) {
            background-color: #e9f2fa;
            color: #004a8d;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #004a8d;">
        <div class="container">
            <a class="navbar-brand" href="#">Connect Senac <span class="badge bg-light text-dark ms-2">Área do
                    Professor</span></a>
            <button class="btn btn-outline-light btn-sm" id="btnSair">Sair</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="section-title">👨‍🏫 As Minhas Turmas e Listas de Modelos</h4>
            <span class="text-muted small">Ligado como: <strong id="nomeProf">--</strong></span>
        </div>

        <div class="accordion shadow-sm" id="accordionTurmas">
            <div class="text-center text-muted p-5">A carregar a pauta de presenças...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.protocol === 'file:' ? 'http://localhost:3000/api' : `${window.location.origin}/api`;
        const token = localStorage.getItem('token');

        if (!token) window.location.href = 'index.html';

        const payloadToken = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('nomeProf').textContent = payloadToken.email.split('@')[0];

        document.getElementById('btnSair').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });

        async function carregarMinhasTurmas() {
            const accordion = document.getElementById('accordionTurmas');
            try {
                const response = await fetch(`${API_URL}/profissional/minhas-turmas`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const cursos = await response.json();
                accordion.innerHTML = '';

                if (cursos.length === 0) {
                    accordion.innerHTML = '<div class="alert alert-info border-0 shadow-sm">Nenhum curso ativo vinculado ao seu perfil de momento.</div>';
                    return;
                }

                cursos.forEach((curso, index) => {
                    let horariosHTML = '';

                    // Ordenar as disponibilidades por data no Front-end por garantia
                    curso.disponibilidades.sort((a, b) => new Date(a.data_hora) - new Date(b.data_hora));

                    curso.disponibilidades.forEach(disp => {
                        const dataFormatada = new Date(disp.data_hora).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });

                        // Filtrar agendamentos que não foram cancelados
                        const agendamentosAtivos = disp.agendamentos.filter(a => a.status !== 'cancelado');

                        let tabelaModelos = '';
                        if (agendamentosAtivos.length === 0) {
                            tabelaModelos = `<p class="text-muted small mb-0 mt-2">Nenhum modelo agendado para este horário ainda.</p>`;
                        } else {
                            let linhas = agendamentosAtivos.map(ag => {
                                let acoesHTML = '';
                                if (ag.status === 'agendado') {
                                    acoesHTML = `<button class="btn btn-sm btn-outline-success fw-bold w-100" onclick="concluirServico('${ag.id}')">✅ Confirmar Presença</button>`;
                                } else {
                                    acoesHTML = `<span class="badge w-100 py-2 ${ag.status === 'concluido' ? 'bg-success' : 'bg-secondary'}">${ag.status.toUpperCase()}</span>`;
                                }

                                return `
                                <tr>
                                    <td class="align-middle">${ag.usuarios.nome}</td>
                                    <td class="align-middle"><a href="https://wa.me/55${ag.usuarios.telefone.replace(/\D/g, '')}" target="_blank" class="text-decoration-none text-success">📱 ${ag.usuarios.telefone}</a></td>
                                    <td class="align-middle" style="width: 150px;">${acoesHTML}</td>
                                </tr>
                                `;
                            }).join('');

                            tabelaModelos = `
                                <table class="table table-sm mt-3 border">
                                    <thead class="table-light"><tr><th>Modelo</th><th>Contacto</th><th>Status</th></tr></thead>
                                    <tbody>${linhas}</tbody>
                                </table>`;
                        }

                        horariosHTML += `
                            <div class="mb-4 p-3 bg-white border rounded">
                                <div class="fw-bold text-dark border-bottom pb-2">📅 Aula: ${dataFormatada} <span class="badge bg-secondary float-end">Ocupação: ${disp.vagas_ocupadas} / ${disp.vagas_totais}</span></div>
                                ${tabelaModelos}
                            </div>
                        `;
                    });

                    const itemOpen = index === 0 ? 'show' : '';
                    const btnCollapsed = index === 0 ? '' : 'collapsed';

                    accordion.innerHTML += `
                        <div class="accordion-item border-0 border-bottom">
                            <h2 class="accordion-header">
                                <button class="accordion-button ${btnCollapsed}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${curso.id}">
                                    📘 ${curso.nome}
                                </button>
                            </h2>
                            <div id="collapse${curso.id}" class="accordion-collapse collapse ${itemOpen}" data-bs-parent="#accordionTurmas">
                                <div class="accordion-body bg-light">
                                    ${horariosHTML || '<p class="text-muted">Sem horários abertos para este curso.</p>'}
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                accordion.innerHTML = '<div class="text-danger p-4">Erro ao carregar os dados.</div>';
            }
        }
        // Função ativada pelo clique do professor
        async function concluirServico(agendamentoId) {
            if (!confirm("O modelo compareceu e o serviço foi realizado com sucesso?")) return;

            try {
                const response = await fetch(`${API_URL}/profissional/agendamentos/${agendamentoId}/concluir`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    carregarMinhasTurmas(); // Recarrega a tabela instantaneamente
                } else {
                    const data = await response.json();
                    alert(data.erro);
                }
            } catch (error) {
                alert('Erro ao ligar ao servidor.');
            }
        }
        carregarMinhasTurmas();</script>
</body>

</html>
